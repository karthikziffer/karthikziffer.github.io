<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6c757d"/>
    </marker>
  </defs>

  <rect x="10" y="75" width="190" height="70" rx="10" fill="#e8f3ec" stroke="#03a87c" stroke-width="2"/>
  <text x="105" y="105" text-anchor="middle" font-size="13" fill="#212529" font-weight="600">Knowledge text</text>
  <text x="105" y="124" text-anchor="middle" font-size="11" fill="#495057">one paragraph,</text>
  <text x="105" y="138" text-anchor="middle" font-size="11" fill="#495057">two sentences</text>

  <line x1="200" y1="110" x2="255" y2="110" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow1)"/>

  <rect x="260" y="55" width="220" height="110" rx="10" fill="#e8f3ec" stroke="#03a87c" stroke-width="2"/>
  <text x="370" y="88" text-anchor="middle" font-size="13" fill="#212529" font-weight="600">spaCy parser</text>
  <text x="370" y="108" text-anchor="middle" font-size="11" fill="#495057">dependency-based</text>
  <text x="370" y="124" text-anchor="middle" font-size="11" fill="#495057">sentence boundary</text>
  <text x="370" y="140" text-anchor="middle" font-size="11" fill="#495057">detection</text>

  <line x1="480" y1="90" x2="545" y2="45" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow1)"/>
  <line x1="480" y1="130" x2="545" y2="175" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow1)"/>

  <rect x="550" y="15" width="340" height="60" rx="10" fill="#fff" stroke="#03a87c" stroke-width="2"/>
  <text x="720" y="40" text-anchor="middle" font-size="11" fill="#212529">"Arthur's Magazine (1844-1846) was ...</text>
  <text x="720" y="58" text-anchor="middle" font-size="11" fill="#212529">published in Philadelphia in the 19th century."</text>

  <rect x="550" y="145" width="340" height="60" rx="10" fill="#fff" stroke="#03a87c" stroke-width="2"/>
  <text x="720" y="170" text-anchor="middle" font-size="11" fill="#212529">"First for Women is a woman's magazine</text>
  <text x="720" y="188" text-anchor="middle" font-size="11" fill="#212529">published by Bauer Media Group in the USA."</text>
</svg>
