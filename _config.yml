# Site
name: 'Karthik'
description: 'Tech Blogs'
logo: ''
favicon: 'favicon.ico'
baseurl: ''
email: 'karthik.bengaluru95@gmail.com'

include: ["_pages"]
permalink: /:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag

authors:
    karthik:
      name:           Karthik
      bio:            "An Electronics and Communication Engineer by Degree but a Tech Enthusiast. Working towards bringing research ideas and technical knowledge to solve challenges innovatively."
      email:          karthik.bengaluru95@gmail.com
      twitter:        https://twitter.com/karthikziffer

    Karthik:
      name:           Karthik
      bio:            "An Electronics and Communication Engineer by Degree but a Tech Enthusiast. Working towards bringing research ideas and technical knowledge to solve challenges innovatively."
      email:          karthik.bengaluru95@gmail.com
      twitter:        https://twitter.com/karthikziffer

# Defaults
defaults:

  # all posts
  - scope:
      path: "_posts"
    values:
      layout: post
      author: karthik
      avatar: /assets/images/avatar1.jpg

  # all pages
  - scope:
      path: "_pages"
    values:
      layout: page

# Syntax
markdown: kramdown
highlighter: rouge

# Paginate
paginate: 9

# Exclude metadata and development time dependencies
exclude: [README.markdown, package.json, grunt.js, Gruntfile.js, Gruntfile.coffee, node_modules]
