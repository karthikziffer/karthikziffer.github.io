  <circle class="ring" cx="256" cy="256" r="233" stroke-width="16"/>
  <text class="k" x="256" y="256" text-anchor="middle" dominant-baseline="central"
        font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="300">K</text>
</svg>
