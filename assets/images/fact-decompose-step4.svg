<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6c757d"/>
    </marker>
  </defs>

  <rect x="230" y="10" width="440" height="55" rx="10" fill="#fff" stroke="#212529" stroke-width="2"/>
  <text x="450" y="43" text-anchor="middle" font-size="12" fill="#212529">"Which magazine was started first, Arthur's Magazine or First for Women?"</text>

  <line x1="360" y1="65" x2="230" y2="105" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow4)"/>
  <line x1="540" y1="65" x2="670" y2="105" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow4)"/>

  <rect x="60" y="110" width="340" height="50" rx="8" fill="#e8f3ec" stroke="#03a87c" stroke-width="2"/>
  <text x="230" y="140" text-anchor="middle" font-size="12" fill="#212529">candidate: Arthur's Magazine</text>

  <rect x="500" y="110" width="340" height="50" rx="8" fill="#e8f3ec" stroke="#03a87c" stroke-width="2"/>
  <text x="670" y="140" text-anchor="middle" font-size="12" fill="#212529">candidate: First for Women</text>

  <line x1="230" y1="160" x2="230" y2="210" stroke="#7832e2" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow4)"/>
  <text x="240" y="188" font-size="10" fill="#7832e2">72% match</text>

  <line x1="670" y1="160" x2="670" y2="210" stroke="#7832e2" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow4)"/>
  <text x="680" y="188" font-size="10" fill="#7832e2">100% match</text>

  <rect x="60" y="215" width="340" height="60" rx="8" fill="#fff" stroke="#03a87c" stroke-width="2"/>
  <text x="230" y="238" text-anchor="middle" font-size="11" fill="#212529" font-weight="600">Arthur's Magazine (1844-1846)</text>
  <text x="230" y="256" text-anchor="middle" font-size="11" fill="#495057">DATE: the 19th century → 1800</text>

  <rect x="500" y="215" width="340" height="60" rx="8" fill="#fff" stroke="#ea2f65" stroke-width="2"/>
  <text x="670" y="238" text-anchor="middle" font-size="11" fill="#212529" font-weight="600">First for Women</text>
  <text x="670" y="256" text-anchor="middle" font-size="11" fill="#ea2f65">DATE: none found</text>

  <line x1="230" y1="275" x2="400" y2="320" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow4)"/>
  <line x1="670" y1="275" x2="500" y2="320" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow4)"/>

  <rect x="330" y="325" width="240" height="55" rx="8" fill="#fff" stroke="#212529" stroke-width="2"/>
  <text x="450" y="358" text-anchor="middle" font-size="12" fill="#212529">compare values</text>

  <line x1="450" y1="380" x2="450" y2="410" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow4)"/>

  <rect x="270" y="415" width="360" height="55" rx="10" fill="#fdecef" stroke="#ea2f65" stroke-width="3"/>
  <text x="450" y="440" text-anchor="middle" font-size="13" fill="#ea2f65" font-weight="700">not answerable</text>
  <text x="450" y="458" text-anchor="middle" font-size="11" fill="#ea2f65">couldn't find a date for First for Women</text>
</svg>
